<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>View Rules Details</title>

    <link rel="stylesheet" href="../css/rule-details.css">
</head>

<body>
      
	<nav>
		<div>Salesforce Validation Rules</div>
	</nav>
	
	<section class="container">
	<div class="head">
		<h3>Validation Rule Details</h3>
		
	    <table>
			
			<thead>
				<tr>
					<th>Field</th>
					<th>Details</th>
				</tr>
			</thead>
			
			<tbody>
				<tr>
					<td>Rule Name</td>
					<td id="ruleName">Loding...</td>
				</tr>	
				
				<tr>
					<td>Description</td>
					<td id="description">Loding...</td>
					</tr>	
                <tr>
					<td>Formula</td>
					<td id="formula">Loding...</td>
				</tr>
					
				<tr>
					<td>Error Message</td>
					<td id="errorMessage">Loding...</td>
					
				</tr>
			</tbody>
		</table>
		
		<button class="back" onclick="history.back()">Back</button>
		
		</div>
	</section>
	
	<script>
		
		const ruleId = localStorage.getItem("ruleId");
		
		fetch("/rule/" + ruleId).then(res => res.json())
		                        .then(rule => {
									document.getElementById("ruleName").innerText=rule.ValidationName;
									
									document.getElementById("description").innerText=rule.Metadata.description;
									
									document.getElementById("formula").innerText=rule.Metadata.errorConditionFormula;
									
									document.getElementById("errorMessage").innerText=rule.Metadata.errorMessage;
								});
	</script>
</body>	
</html>
